name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib

          with open("pyproject.toml", "rb") as fp:
              version = tomllib.load(fp)["project"]["version"]

          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              sys.exit(
                  f"Tag {tag!r} does not match pyproject.toml version {version!r}. "
                  f"Use tag {expected!r}."
              )
          PY

      - name: Verify compiled extensions exist
        run: |
          if ! ls src/scansci_pdf/_core/*.pyd 2>/dev/null && ! ls src/scansci_pdf/_core/*.so 2>/dev/null; then
            echo "WARNING: No compiled extensions found. Package will use pure Python fallbacks."
          fi

      - name: Build package
        run: python -m build --sdist --wheel

      - name: Check package
        run: twine check --strict dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scansci-pdf-dist
          path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
